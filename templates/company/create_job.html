<!DOCTYPE html>
<html lang="en">
<head>
  <title>Create Drive — Placement Portal</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/job.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/buttons.css') }}">
</head>
<body>

<div class="job-card">

  <!-- BACK + TITLE -->
  <div class="card-header">
    
    <h2>Create New Drive</h2>
    <a href="{{ url_for('company_dashboard') }}" class="btn back-btn">← Back</a>
  </div>

  <form method="POST">

    <div class="input-group">
      <label>Job Title</label>
      <input type="text" name="title"
             placeholder="e.g. Software Engineer" required>
    </div>

    <div class="input-group">
      <label>Required Skills</label>
      <input type="text" name="skills"
             placeholder="e.g. Python, React, SQL" required>
    </div>

    <div class="input-group">
      <label>Salary</label>
      <input type="text" name="salary"
             placeholder="e.g. 12 LPA" required>
    </div>

    <div class="input-group">
      <label>Job Description</label>
      <textarea name="description" rows="4"
                placeholder="Describe the role, responsibilities, and requirements…" required></textarea>
    </div>

    <button type="submit" class="btn-create">Create Drive →</button>

  </form>

</div>

</body>
</html>
