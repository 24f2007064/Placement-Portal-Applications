<!DOCTYPE html>
<html lang="en">
<head>
  <title>Student Profile — Placement Portal</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/job.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/buttons.css') }}">
</head>
<body>

<div class="job-card">

  <!-- BACK + TITLE -->
<div class="card-header">
  <h2>Edit Profile</h2>
  <a href="{{ url_for('student_dashboard') }}" class="btn back-btn">← Back</a>
</div>

  <form method="POST">

    <div class="input-group">
      <label>Department</label>
      <input type="text" name="department"
             value="{{ student.department or '' }}"
             placeholder="e.g. Computer Science" required>
    </div>

    <div class="input-group">
      <label>CGPA</label>
      <input type="text" name="cgpa"
             value="{{ student.cgpa or '' }}"
             placeholder="e.g. 8.5" required>
    </div>

    <div class="input-group">
      <label>Resume Link</label>
      <input type="text" name="resume"
             value="{{ student.resume or '' }}"
             placeholder="https://drive.google.com/..." required>
    </div>

    <button type="submit" class="btn-create">Save Profile →</button>

  </form>

</div>

</body>
</html>
